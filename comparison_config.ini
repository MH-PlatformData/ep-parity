# Parity Comparison Configuration
# This file allows you to customize the comparison behavior

[global_ignore_columns]
# Columns that should be ignored across ALL file comparisons
# These are typically system-generated fields that will differ between databases
updated_at = true
created_at = true
id = true
deposited_file_id = true
potentials_id = true
modified_at = true
last_modified = true
inserted_at = true

[file_specific_ignore_columns]
# Additional columns to ignore for specific files
# Format: filename = column1,column2,column3

1-deposited_files.psv = ended_at,scan_started_at,customized_file_name,scan_ended_at,updated_at,created_at
4a-cleaned_dataset_rows.csv = cleaned_dataset_id,deposited_file_row_id,clean_notes,start_cleaning_at,start_processing_at,finish_cleaning_at,finish_processing_at,updated_at,created_at
5a-activities-potential.psv = activities_id,trackable_id,object_changes
6-activities-issues.psv = trackable_id,target_user_id
9-issues-potentials.psv = issue_id,assignable_id,updated_at,created_at
10-issues-ueps.psv = issue_id,assignable_id,updated_at,created_at
12-pg_search_docs-potentials.psv = searchable_id
13-pg_search_docs-users.psv = searchable_id
14-pg_search_docs-ueps.psv = searchable_id
15-potentials.psv = cleaned_dataset_row_id,id,comes_from_id,home_address_id,work_address_id,resolved_at


[exclude_files]
# Files to completely exclude from comparison (case-insensitive)
# Set to true to exclude the file
2a-deposited_file_rows.psv = true
2b-deposited_file_rows_data.csv = true
2c-deposited_file_rows_data_raw.csv = true
3-cleaned_datasets.psv = true
4b-cleaned_dataset_rows_transformed_data.csv = true
4c-cleaned_dataset_rows_process_notes.csv = true
5b-activities-potentials_object_changes.csv = true
6-activities-issues.psv = true
7b-addresses_users.psv = true
7c-addresses_potentials.psv = true
13-pg_search_docs-users.psv = true
14-pg_search_docs-ueps.psv = true
19a-versions-potentials_create.psv = true
19b-versions-potentials_update.psv = true
19c-versions-potentials_update_object.csv = true

[normalize_columns]
# Columns that should be normalized before comparison
# Format: filename = column1,column2,column3
# Normalization: removes extra spaces, converts to lowercase, standardizes format
9-issues-potentials.psv = description
11-users.psv = gender
10-issues-ueps.psv = gender
15-potentials.psv = employer_based_person_code_description

[normalize_none_string_columns]
# Columns where the string "None" should be treated as equivalent to empty/null
# Format: filename = column1,column2,column3
# This is useful for concatenated string fields where "None" may appear as a placeholder
12-pg_search_docs-potentials.psv = content

[comparison_settings]
# General comparison settings
max_sample_differences = 5
max_unique_rows_display = 10
case_sensitive_comparison = false